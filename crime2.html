<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crime Scene 2</title>

<link rel="stylesheet" href="style.css">

<style>

.room{

position:relative;

width:900px;

height:550px;

background:#333;

border:4px solid gold;

overflow:hidden;

}

.item{

position:absolute;

cursor:pointer;

transition:.3s;

}

.item:hover{

transform:scale(1.08);

}

</style>

</head>

<body>

<div class="container">

<h1>Crime Scene</h1>

<p>Search the room carefully.</p>

<div class="room">

<div
class="item"
style="left:120px;top:330px;font-size:70px;"
onclick="findClue('🪑 Chair')">

🪑

</div>

<div
class="item"
style="left:650px;top:100px;font-size:70px;"
onclick="findClue('🖼 Secret Painting')">

🖼️

</div>

<div
class="item"
style="left:420px;top:250px;font-size:70px;"
onclick="findClue('🗄 Drawer')">

🗄️

</div>

<div
class="item"
style="left:760px;top:40px;font-size:60px;"
onclick="toggleLight()">

💡

</div>

</div>

<br>

<button onclick="location.href='office.html'">

⬅ Office

</button>

</div>

<script src="crime2.js"></script>
<script src="save.js"></script>
</body>
</html>
